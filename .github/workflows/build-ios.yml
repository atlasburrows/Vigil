name: Build & Deploy iOS to TestFlight (Auto-Certificates)

on:
  push:
    branches: [master, main]
    paths:
      - 'src/Atlas.MAUI/**'
      - 'src/Atlas.Shared/**'
      - 'src/Atlas.Domain/**'
      - 'src/Atlas.Application/**'
      - '.github/workflows/build-ios.yml'
  workflow_dispatch:
    inputs:
      deploy_to_testflight:
        description: 'Deploy to TestFlight?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  setup-certificates:
    runs-on: macos-15
    outputs:
      certificate_created: ${{ steps.create_cert.outputs.created }}
    
    steps:
      - name: Install dependencies
        run: |
          brew install jq
          # Install compatible iOS workload for Xcode 16.2
          # .NET 10's iOS SDK 26.0 requires Xcode 26.0 which doesn't exist
          # Use .NET 9 iOS SDK (17.5.8030) which supports Xcode 16.x
          dotnet workload install ios --version 9.0.100 --skip-sign-check
          dotnet workload install maui --skip-sign-check

      - name: Create Certificate Signing Request
        id: create_csr
        run: |
          openssl req -new -newkey rsa:2048 -nodes \
            -keyout ~/private.key \
            -out ~/certificate.csr \
            -subj "/emailAddress=burrows.mikal@gmail.com, CN=Mikal Burrows, C=US"
          echo "csr_created=true" >> $GITHUB_OUTPUT

      - name: Create Apple Distribution Certificate via API
        id: create_cert
        env:
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          if [ -z "$APPLE_ISSUER_ID" ] || [ -z "$APPLE_KEY_ID" ] || [ -z "$APPLE_API_KEY" ]; then
            echo "Apple API credentials not configured. Skipping certificate creation."
            echo "created=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Create JWT for App Store Connect API
          JWT_HEADER=$(echo -n '{"alg":"ES256","kid":"'"$APPLE_KEY_ID"'","typ":"JWT"}' | base64 | tr -d '=' | tr '/+' '_-' | tr -d '\n')
          JWT_CLAIMS=$(echo -n '{"iss":"'"$APPLE_ISSUER_ID"'","iat":'$(date +%s)',"exp":'$(($(date +%s) + 1200))',"aud":"appstoreconnect-v1"}' | base64 | tr -d '=' | tr '/+' '_-' | tr -d '\n')
          
          # Note: Full JWT signing requires the private key - this is a simplified example
          # In practice, you'd use a tool like fastlane or a proper JWT library
          
          echo "Certificate creation requires App Store Connect API with proper JWT signing."
          echo "For now, certificates must be created manually or use fastlane match."
          echo "created=false" >> $GITHUB_OUTPUT

  build-ios-debug:
    runs-on: macos-15
    needs: setup-certificates
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Select Xcode Version
        run: |
          echo "Available Xcode versions:"
          ls -la /Applications/ | grep Xcode
          echo "Selecting Xcode 16.2..."
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          xcode-select -p
          xcrun xcodebuild -version

      - name: Install .NET workloads
        run: |
          echo "Installing .NET MAUI workloads..."
          # Use .NET 9 iOS SDK which supports Xcode 16.x
          dotnet workload install ios --version 9.0.100 --skip-sign-check
          dotnet workload install maui --skip-sign-check
          echo "Verifying installed workloads..."
          dotnet workload list
          echo "Checking iOS SDK version..."
          ls -la ~/.dotnet/packs/Microsoft.iOS.Sdk*/

      - name: Restore dependencies
        run: dotnet restore src/Atlas.MAUI/Atlas.MAUI.csproj -p:IOSOnly=true

      - name: Build iOS (Compile Only)
        run: |
          echo "=== Starting iOS Compile Check ==="
          dotnet build src/Atlas.MAUI/Atlas.MAUI.csproj \
            -f net10.0-ios \
            -c Debug \
            -r iossimulator-arm64 \
            /p:IOSOnly=true \
            /p:BuildIpa=false \
            /p:RunAOTCompilation=false \
            --verbosity normal
          echo "=== Build Complete ==="

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: atlas-ios-debug
          path: src/Atlas.MAUI/bin/Debug/net10.0-ios/iossimulator-arm64/
          retention-days: 14

      - name: Upload Build Logs on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ios-build-logs-debug
          path: |
            src/Atlas.MAUI/obj/Debug/net10.0-ios/
            src/Atlas.MAUI/bin/Debug/net10.0-ios/
          retention-days: 7

  build-and-deploy-ios:
    runs-on: macos-15
    needs: [setup-certificates, build-ios-debug]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: |
          # Use .NET 9 iOS SDK which supports Xcode 16.x
          dotnet workload install ios --version 9.0.100 --skip-sign-check
          dotnet workload install maui --skip-sign-check

      - name: Restore dependencies
        run: dotnet restore src/Atlas.MAUI/Atlas.MAUI.csproj -p:IOSOnly=true

      - name: Setup Code Signing with Apple API
        env:
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ISSUER_ID" ] || [ -z "$APPLE_KEY_ID" ] || [ -z "$APPLE_API_KEY" ]; then
            echo "⚠️  Apple API credentials not set. Skipping code signing."
            echo "To enable TestFlight deployment, add these secrets:"
            echo "  - APPLE_ISSUER_ID"
            echo "  - APPLE_KEY_ID"  
            echo "  - APPLE_API_KEY"
            echo "  - APPLE_TEAM_ID"
            exit 0
          fi
          
          # Install fastlane for automated certificate management
          gem install fastlane
          
          # Create temporary keychain
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          
          # Use fastlane match or API to get certificates
          # This requires setup - see FASTLANE_SETUP.md
          echo "✅ Apple API credentials configured"

      - name: Update Info.plist for Build Number
        run: |
          PLIST_FILE="src/Atlas.MAUI/Platforms/iOS/Info.plist"
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST_FILE" || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD_NUMBER" "$PLIST_FILE"
          echo "Set build number to $BUILD_NUMBER"

      - name: Build iOS App (Device - Requires Signing)
        env:
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
        run: |
          if [ -z "$APPLE_ISSUER_ID" ]; then
            echo "⚠️  Building without code signing (simulator only)"
            echo "Add Apple API credentials to enable device builds"
            exit 0
          fi
          
          dotnet build src/Atlas.MAUI/Atlas.MAUI.csproj \
            -f net10.0-ios \
            -c Release \
            /p:IOSOnly=true \
            /p:RuntimeIdentifier=ios-arm64 \
            /p:CodesignKey="iPhone Distribution" \
            /p:CodesignProvision="Vigil App Store"

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: src/Atlas.MAUI/bin/Release/net10.0-ios/
          retention-days: 7

      - name: Summary
        run: |
          echo "## iOS Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Debug build completed (simulator)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To enable TestFlight deployment, add these repository secrets:" >> $GITHUB_STEP_SUMMARY
          echo "- \\`APPLE_ISSUER_ID\\` - From App Store Connect → Users & Access → Keys" >> $GITHUB_STEP_SUMMARY
          echo "- \\`APPLE_KEY_ID\\` - Your API Key ID" >> $GITHUB_STEP_SUMMARY
          echo "- \\`APPLE_API_KEY\\` - Content of the .p8 private key file" >> $GITHUB_STEP_SUMMARY
          echo "- \\`APPLE_TEAM_ID\\` - Your Apple Developer Team ID" >> $GITHUB_STEP_SUMMARY
