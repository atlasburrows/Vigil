workflows:
  maui-ios:
    name: .NET MAUI iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        DOTNET_VERSION: "10.0.x"
        DOTNET_PATH: "$CM_BUILD_DIR/dotnet"
        DOTNET: "$CM_BUILD_DIR/dotnet/dotnet"
      xcode: latest
    scripts:
      - name: Install .NET SDK
        script: |
          echo "Installing .NET SDK..."
          wget https://dot.net/v1/dotnet-install.sh
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --channel 10.0 --install-dir $DOTNET_PATH
          export PATH="$DOTNET_PATH:$PATH"
          dotnet --version
      
      - name: Install MAUI workload
        script: |
          export PATH="$DOTNET_PATH:$PATH"
          echo "Installing MAUI workloads..."
          dotnet workload install maui-ios --source https://api.nuget.org/v3/index.json
          dotnet workload list
      
      - name: Restore dependencies
        script: |
          export PATH="$DOTNET_PATH:$PATH"
          dotnet restore src/Atlas.MAUI/Atlas.MAUI.csproj
      
      - name: Build iOS
        script: |
          export PATH="$DOTNET_PATH:$PATH"
          echo "Building iOS..."
          dotnet build src/Atlas.MAUI/Atlas.MAUI.csproj \
            -f net10.0-ios \
            -c Debug \
            /p:BuildIpa=false \
            --verbosity normal
      
      - name: Upload build artifacts
        script: |
          echo "Build completed!"
          ls -la src/Atlas.MAUI/bin/Debug/net10.0-ios/
    artifacts:
      - src/Atlas.MAUI/bin/Debug/net10.0-ios/*.app
      - src/Atlas.MAUI/bin/Debug/net10.0-ios/*.dll
